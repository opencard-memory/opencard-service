<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCard | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #050a14;
            color: #ffffff;
            overflow: hidden;
        }
        .gradient-bg {
            background: radial-gradient(circle at top right, #1e3a8a 0%, transparent 40%),
                        radial-gradient(circle at bottom left, #1e40af 0%, transparent 40%);
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        /* 로고 배경을 투명하게 처리하는 스타일 */
        .logo-container img {
            max-height: 50px;
            width: auto;
            /* 배경이 검은색인 경우 검은색을 날려버리는 설정 */
            mix-blend-mode: screen; 
            /* 이미지의 대비를 살짝 높여서 더 선명하게 보이게 함 */
            filter: contrast(1.1) brightness(1.1);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex flex-col">

    <!-- Header / Logo Section -->
    <header class="p-6 md:p-10 w-full flex justify-between items-center z-10">
        <div class="logo-container">
            <img src="https://photo.opencard.uk/1776603922620.png" 
                 alt="OpenCard Logo" 
                 onerror="this.src='https://via.placeholder.com/150x40?text=OpenCard'">
        </div>
        <div>
            <span class="text-sm font-semibold tracking-widest text-blue-400 uppercase">Project OpenCard</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col justify-center items-center px-6 text-center z-10">
        <div class="animate-float mb-8">
            <div class="w-24 h-24 bg-blue-600 rounded-3xl rotate-12 flex items-center justify-center shadow-2xl shadow-blue-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-white -rotate-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
                </svg>
            </div>
        </div>

        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight">
            Coming Soon!
        </h1>
        
        <p class="text-lg md:text-2xl text-gray-400 max-w-2xl font-light leading-relaxed">
            We will start building the system soon!
        </p>

        <div class="mt-12 flex flex-col md:flex-row gap-4">
            <div class="px-8 py-3 bg-white text-black font-semibold rounded-full hover:bg-gray-200 transition duration-300 cursor-pointer">
                Stay Updated
            </div>
            <div class="px-8 py-3 bg-transparent border border-gray-700 text-gray-300 font-semibold rounded-full hover:bg-gray-800 transition duration-300 cursor-pointer">
                Learn More
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="p-10 w-full flex flex-col md:flex-row justify-between items-center text-gray-500 text-sm z-10">
        <div class="mb-4 md:mb-0">
            &copy; 2026 OpenCard Organization. All rights reserved.
        </div>
        <div class="flex gap-6">
            <a href="#" class="hover:text-blue-400 transition">Twitter</a>
            <a href="#" class="hover:text-blue-400 transition">GitHub</a>
            <a href="#" class="hover:text-blue-400 transition">Contact</a>
        </div>
    </footer>

    <!-- Decorative Elements (Background) -->
    <div class="fixed top-1/4 left-1/4 w-96 h-96 bg-blue-900/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="fixed bottom-1/4 right-1/4 w-64 h-64 bg-indigo-900/20 rounded-full blur-[100px] pointer-events-none"></div>

</body>
</html>
